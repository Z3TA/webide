<!DOCTYPE html>
<html>
<head>
	<link rel="stylesheet" type="text/css" href="../gfx/doc.css" />
</head>
<body>

<h1>JZedit documentation</h1>
	
<p>List of all documents:</p>

<ul>
	<?JS
	
	var docs = document.folder.documents;
	
	var doc;
	for(var name in docs) {
		
		doc = docs[name];
		
		document.write('\n\t\t<li>\n');
		
		document.write('\t\t\t<a href="' + doc.url + '">' + doc.title + '</a>\n');
		//document.write('\t\t\t<p>' + doc.lead.replace(/<[^>]*>/g, " ") + '</p>\n');
		
		document.write('\t\t</li>\n');
		
	}
	
	?>
</ul>


</body>
</html>
