<!DOCTYPE HTML>
<html lang="en">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
	<link rel="stylesheet" type="text/css" href="welcome.css">
	
	<title>HTML Examples</title>
	
</head>
<body>

<!--

<h1>Header1</h1>

<h2>Header2</h2>

<h3>Header3</h3>

<h4>Header4</h4>

<p>This is a paragraph.</p>

<p>This is another paragraph with <b>bold</b> <i>italic</i> and <u>underlined</u> text.</p> 

<!-- SVG smilie image -->
<svg width="204" height="204">
	<circle cx='102' cy='102' r='100' fill='yellow' stroke="black" stroke-width='2'/>
	<circle cx='60' cy='65' r='15' fill='black'/>
	<circle cx='140' cy='60' r='16' fill='black'/>
	<path d='M 70 140 A 10 10 90 0 0 150 120' stroke='red' stroke-width='8'/>
	<!--A rx ry x-axis-rotation large-arc-flag sweep-flag x y -->
</svg>

<hr />

<p>A paragraph with a line<br>
break in it</p>

<table>
	<tr>
		<th>Table header</th>
		<th>Table header 2</th>
	</tr>
	<tr>
		<td>Row 1</td>
		<td>Interesting data</td>
		</tr>
	<tr>
		<td>Row 2</td>
		<td>Interesting data 2</td>
	</tr>
</table>

<center>
<p>A paragraph in the center</p>
</center>

<form action="http://http_server_example_dev.%USERNAME%.%DOMAIN%">
	<!--
	
	In order the recive form data, start the Node.JS script: 
	nodejs_examples/http_server/http_server_example.js
	
	--->
	<input type="hidden" name="secret" value="Can't see this" />
	
	<input type="text" name="textinput" placeholder="type text here" size="30" /><br>
	<br>
	<textarea name="bigtext" rows="4" cols="40">Type a lot of text here</textarea><br>
	<br>
	<label for="date">Pick a date: <input type="date" id="date" name="date" /></label><br>
	<br>
	<label for="phone">Your nr: <input type="text" id="phone" name="phone" /></label><br>
	<br>
	<input type="radio" id="dogs" name="animal" /><label for="dogs">I like dogs</label><br>
	<input type="radio" id="cats" name="animal" /><label for="cats">I like cats</label><br>
	<br>
	<input type="checkbox" id="alegic" name="alegic" /><label for="alegic">I'm alegic to pets</label><br>
	<br>
	<button type="button">I'm a button</button>
	<button type="submit">Click to submit</button>
	
</form>

</body>
</html>
