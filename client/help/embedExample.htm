<DOCTYPE HTML>
<html>
<head>
	<meta charset="utf-8">
	
	<title>Embed editor example</title>
	
	<link rel="stylesheet" type="text/css" href="../gfx/doc.css" />
	
	<!--<script src="https://webide.se/embed.js"></script>-->
	<script src="http://127.0.0.1:8080/embed.js"></script>
	
	<style>
		
		.editor {
			border-top: 1px solid #ccc;
			border-left: 1px solid #ccc;
			
			border-right: 1px solid #aaa;
			border-bottom: 1px solid #aaa;
			margin-bottom: 1em;
			box-shadow: 3px 3px 5px 2px #eee;
		}
		
	</style>
		
		</head>
		<body>
		
		<h1>Embedding the editor into a web page</h1>
		
<p>View the source code!</p>

<textarea class="editor" name="code.js">alert("Hello World");</textarea>
<br>
<button onclick="eval(document.getElementsByName('code.js')[0].value)">Run code</button>


	</body>
	</html>
