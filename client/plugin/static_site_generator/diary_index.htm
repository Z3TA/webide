<body>

<h1>Diary</h1>

<?JS

var files = document.folder.documents;

var weekday = new Array(7);
weekday[0] = "Sunday";
weekday[1] = "Monday";
weekday[2] = "Tuesday";
weekday[3] = "Wednesday";
weekday[4] = "Thursday";
weekday[5] = "Friday";
weekday[6] = "Saturday";

var months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];


for(var f in files) {
if(f == "index.htm") continue;

var path = files[f]["path"];
var strDate = path.slice(0,  path.lastIndexOf(".")).slice(Math.max(path.lastIndexOf("/"), path.lastIndexOf("\\"))+1);

var d = new Date(strDate);
var dayOfWeek = weekday[d.getDay()];
var dayNr = d.getDate();
var monthName = months[d.getMonth()];
var year = d.getFullYear();

document.write("<h2>" + dayOfWeek + " " + dayNr + " " + monthName + " " + year + "</h2>");

document.write(files[f]["body"]);

document.write("<hr>");
}

?>

</body>
