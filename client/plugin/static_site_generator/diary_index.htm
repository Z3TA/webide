<body>

<h1>Diary</h1>

<?JS

var weekday = new Array(7);
weekday[0] = "Sunday";
weekday[1] = "Monday";
weekday[2] = "Tuesday";
weekday[3] = "Wednesday";
weekday[4] = "Thursday";
weekday[5] = "Friday";
weekday[6] = "Saturday";

var months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];


var files = [];
for(var f in document.folder.documents) {
if(f == "index.htm") continue;
files.push(document.folder.documents[f]);
}

files.sort(function (a, b) {
return new Date(b.name) - new Date(a.name);
});

files.forEach(print);

function print(file) {

var d = new Date(file.name);
var dayOfWeek = weekday[d.getDay()];
var dayNr = d.getDate();
var monthName = months[d.getMonth()];
var year = d.getFullYear();

document.write("<h2>" + dayOfWeek + " " + dayNr + " " + monthName + " " + year + "</h2>");

document.write(file.body);

document.write("<hr>");
}

?>

</body>
