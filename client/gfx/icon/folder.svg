<svg version="1.1" baseProfile="full" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
<defs>

<radialGradient id="radialGradient" fx="5%" fy="5%" r="100%">
<stop class="stop1" offset="0%"/>
<stop class="stop2" offset="100%"/>
</radialGradient>

<style type="text/css"><![CDATA[

.folder {
fill: url(#radialGradient);
stroke: #815f3f;
stroke-width: 1;
}
.stop1 { stop-color: #fdf0c0; }
.stop2 { stop-color: #f4bb74; }

.shadow1 {
stroke: #cfaa72;
stroke-linecap: round;
}
.shadow2 {
stroke: #f4bb74;
stroke-linecap: round;
stroke-width: 1.5;
}

]]></style>
</defs>

<rect class="folder" x="4" y="2" width="12" height="8" rx="2" ry="2"/>

<rect class="folder" x="2" y="5" width="28" height="20" rx="2" ry="2"/>

<line class="shadow1" x1="5" y1="5" x2="15" y2="5" />

<line class="shadow2" x1="4" y1="24" x2="28" y2="24" />
<line class="shadow2" x1="29" y1="7" x2="29" y2="23" />

</svg>
