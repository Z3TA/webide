<svg version="1.1" baseProfile="full" viewBox="1 1 16 16" xmlns="http://www.w3.org/2000/svg">
<defs>

<radialGradient id="radialGradient" fx="5%" fy="5%" r="100%">
<stop class="stop1" offset="0%"/>
<stop class="stop2" offset="100%"/>
</radialGradient>

<style type="text/css"><![CDATA[

.folder {
fill: url(#radialGradient);
stroke: #815f3f;
stroke-width: 0.5;
}
.stop1 { stop-color: #fdf0c0; }
.stop2 { stop-color: #f4bb74; }

.shadow1 {
stroke: #cfaa72;
stroke-linecap: round;
}
.shadow2 {
stroke: #f4bb74;
stroke-linecap: round;
}

]]></style>
</defs>

<rect class="folder" x="3" y="2" width="6" height="4" rx="1" ry="1"/>

<rect class="folder" x="2" y="4" width="14" height="10" rx="1" ry="1"/>

<line class="shadow1" x1="4" y1="4" x2="8" y2="4" />

<line class="shadow2" x1="3" y1="13" x2="14" y2="13" />
<line class="shadow2" x1="15" y1="5" x2="15" y2="12" />

</svg>
