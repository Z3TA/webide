<html>
<head>
	<title>Subpixel rendering</title>
	
	<!-- src: http://johnvalentine.co.uk/archive.php?art=tft -->
	
</head>
<body class="jv">

		<h1>HTML5 canvas</h1>
		
		<style>
			#destCanvas   { width: 900px; height: 600px; box-shadow: 0px 7px 18px rgba(0,0,0,0.3); }
			#sourceCanvas { width: 2700px; height: 600px; display: none;}
			
			
		</style>
		<script>
			
			init = function() {
				
				var s = document.getElementById("sourceCanvas");
				var ctx = s.getContext('2d');
				
				if (typeof initDone == 'undefined') {
					ctx.scale(3,1); // just do this once
				}
				
				initDone = true; // global
				
				drawImage();
				
			}
			
			drawImage = function() {
				
				var s = document.getElementById("sourceCanvas");
				var d = document.getElementById("destCanvas");
				
				var ctx = s.getContext('2d');
				
				// set transformations to use 3:1 on the renderCanvas
				
				// draw something
				with (ctx) {
					
					save();
					
					// clear to white
					fillStyle = 'hsla(0, 10%, 100%, 1)';
					fillRect( 0, 0, 900, 600 );
					
					
					// write some text
					var yp = 12;
					fillStyle = 'hsla(0, 0%, 0%, 1)';
			
			ctx.font = 'italic 32px Monospace';
			fillText('Hello world!', 100, 100);
			
					restore();
					
				}
				
				copyPix_LCD(s, d, 0.34);
				
			}
			
			
			copyPix_LCD = function( source, dest, w1 ) {
				// copies a 3:1 image to a 1:1 image, using LCD stripes
				// w1 = centre weighting for sampling. e.g. 0.6
				
				var sc = source.getContext('2d');
				var sw = source.width;
				var sh = source.height;
				var sp = sc.getImageData(0, 0, sw, sh);
				
				var dc = dest.getContext('2d');
				var dw = dest.width;
				var dh = dest.height;
				var dp = dc.getImageData(0, 0, dw, dh);
				
				var readIndex, writeIndex, r, g, b, a, x, y;
				
				// sampling weightings. w1 = weight for sub-pixel; w2 = weight for
				var w2 = (1-w1) * 0.5;
				var w21 = w1 + w2;
				var w211 = w2 + w2 + w1;
				
				// copy. we cheat, by ignoring the width edges.
				// todo: check extents of source reads, e.g. to use 0..dw, and then prevent index error (too slow?)
				for( y = 0; y < dh; y++ ) {
					
					for( x = 1; x < (dw-1); x++ ) {
						
						readIndex  = (y * sw + x * 3) * 4;
						writeIndex = (y * dw + x) * 4;
						
						// r
						dp.data[writeIndex + 0] = Math.round(
						w1 *   sp.data[ readIndex + 0 ]
						+	w2 * ( sp.data[ readIndex - 4 ] + sp.data[ readIndex +  4 ] )
						);
						
						// g
						dp.data[writeIndex + 1] = Math.round(
						w1 *   sp.data[ readIndex + 5 ]
						+	w2 * ( sp.data[ readIndex + 1 ] + sp.data[ readIndex +  9 ] )
						);
						
						// b
						dp.data[writeIndex + 2] = Math.round(
						w1 *   sp.data[ readIndex + 10 ]
						+	w2 * ( sp.data[ readIndex + 6 ] + sp.data[ readIndex + 14 ] )
						);
						
						// a
						dp.data[writeIndex + 3] = Math.round(
						0.3333 * (
						w211 *   sp.data[ readIndex + 7 ]
						+	w21  * ( sp.data[ readIndex + 3 ] + sp.data[ readIndex + 11 ] )
						+	w2   * ( sp.data[ readIndex - 1 ] + sp.data[ readIndex + 15 ] )
						)
						);
						
					}
					
				}
				
				dc.putImageData(dp,0,0);
			}
			</script>
			
			<div id="content">
				<h2>Canvas demo: subpixel rendering</h2>
				<p>This is a proof-of-concept demo of sub-pixel rendering, which takes advantage of the position of individual red, green, and blue display pixels, to deliver higher-resolution images.</p>
			</div>
			<center>
			<div><canvas id="destCanvas" width="900" height="600" style="margin-top: 1em"></canvas></div>
			<div style="margin: 1em 3em;">
				<button name="redraw" id="redraw" class="button primary" onclick="init(); self.innerHTML='Draw it again'; self.onclick='drawImage()'; " tabindex="1">Draw</button>
			</div>
			</center>
			
			<canvas id="sourceCanvas" width="2700" height="600"></canvas>
			
		</body>
		</html>
