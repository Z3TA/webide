		function createFontMap(callback, font, fontSize, boxWidth, boxHeight) {
			
			if(font == undefined) font = "monospace";
			if(fontSize == undefined) fontSize = defaultFontSize;
			if(boxWidth == undefined) boxWidth = defaultBoxWidth;
			if(boxHeight == undefined) boxHeight = defaultBoxHeight;
			
			var start = 69;
			var end = 70;
			var capture = end - start;
			
			for(var i=start; i<end; i++) {
				captureLetter(i);
			}
			
			function captureLetter(charCode) {
				
				var canvas = document.createElement('canvas');
				var ctx = canvas.getContext('2d');
				var string = String.fromCharCode(charCode);
				var scaleX = 3;
				var scaleY = 1;
				
				ctx.scale(scaleX,scaleY);
				
				ctx.font = fontSize + "px " + font;
				ctx.fillStyle = 'rgba(0,0,0,1)';
				
				canvas.width = boxWidth * scaleX;
				canvas.height = boxHeight * scaleY;
				
				ctx.clearRect(0, 0, canvas.width, canvas.height);
				ctx.fillText(string, 0, boxHeight);
				
				
				// Wait for the canvas to fill before capturing the text
				setTimeout(function() {
					
					letter[charCode] = smooth(ctx.getImageData(0,0,boxWidth*scaleX,boxHeight*scaleY));
					
					if(--capture == 0 && callback) callback();
					//console.log(capture);
					
				}, 0);
				
				function smooth(sourceImage) {
					
					var smoothCanvas = document.createElement('canvas');
					var smoothCtx = smoothCanvas.getContext('2d');
					
					smoothCanvas.width = defaultBoxWidth;
					smoothCanvas.height = defaultBoxHeight;
					
					console.log(canvas.height);
					
					var sw = canvas.width;
					var sh = canvas.height;
					var sp = sourceImage;
					
					var dw = smoothCanvas.width;
					var dh = smoothCanvas.height;
					var dp = smoothCtx.createImageData(defaultBoxWidth,defaultBoxHeight);
					
					var readIndex, writeIndex, r, g, b, a, x, y;
					
					console.log(dp);
					
					// sampling weightings. w1 = weight for sub-pixel; w2 = weight for
					var w1 = 0.34;
					var w2 = (1-w1) * 0.5;
					var w21 = w1 + w2;
					var w211 = w2 + w2 + w1;
					
					// copy. we cheat, by ignoring the width edges.
					// todo: check extents of source reads, e.g. to use 0..dw, and then prevent index error (too slow?)
					for( y = 0; y < dh; y++ ) {
						
						for( x = 1; x < (dw-1); x++ ) {
							
							readIndex  = (y * sw + x * 3) * 4;
							writeIndex = (y * dw + x) * 4;
							
							// r
							dp.data[writeIndex + 0] = Math.round(w1 * sp.data[ readIndex + 0 ] +	w2 * ( sp.data[ readIndex - 4 ] + sp.data[ readIndex +  4 ] ));
							
							//dp.data[writeIndex + 0] = 255;
							
							// g
							dp.data[writeIndex + 1] = Math.round(w1 * sp.data[ readIndex + 5 ] +	w2 * ( sp.data[ readIndex + 1 ] + sp.data[ readIndex +  9 ] ));
							
							// b
							dp.data[writeIndex + 2] = Math.round(w1 * sp.data[ readIndex + 10 ] +	w2 * ( sp.data[ readIndex + 6 ] + sp.data[ readIndex + 14 ] ));
							
							// a
							dp.data[writeIndex + 3] = Math.round(0.3333 * (w211 *   sp.data[ readIndex + 7 ] +	w21  * ( sp.data[ readIndex + 3 ] + sp.data[ readIndex + 11 ] ) +	w2   * ( sp.data[ readIndex - 1 ] + sp.data[ readIndex + 15 ] )));
							}
					}
					
					testCanvasCtx.putImageData(dp,50,100);
					testCanvasCtx.putImageData(sourceImage,100,100);
					
					return dp;
					}
				
				
				}
			}
